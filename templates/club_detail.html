<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Detail — ClubConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/club-detail.css">
</head>
<body class="page-enter">
    <div id="toast-container"></div>
    <div id="progress-bar"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/user/clubs" class="nav-back" id="nav-back">← Back</a>
            <span class="nav-icon">🎓</span>
            <span class="nav-title">ClubConnect</span>
        </div>
        <div class="nav-user">
            <a href="/logout" class="btn btn-outline btn-sm" id="btn-logout">Logout</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="club-hero" id="clubHero">
        <div class="club-hero-content">
            <div class="club-hero-avatar" id="clubEmoji">🚀</div>
            <div class="club-hero-text">
                <h1 id="clubName">Loading...</h1>
                <div class="club-hero-stats">
                    <span class="stat-chip" id="memberStat">0 members</span>
                    <span class="stat-chip" id="eventStat">0 events</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Tab Navigation -->
    <div class="tab-navigation">
        <button class="tab-btn active" data-tab="members" id="tab-members">👥 Members</button>
        <button class="tab-btn" data-tab="events" id="tab-events">📅 Events</button>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">
        <div class="tab-panel active" id="pane-members"></div>
        <div class="tab-panel" id="pane-events"></div>
    </div>

    <script>
        const CLUB_NAME = "{{ club_name }}";
    </script>
    <script src="/static/js/club-detail.js"></script>
</body>
</html>
